<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm Scanner Futuristik</title>
    <style>
        /* --- CSS --- */
        body {
            background-color: #050a0f;
            color: #00f2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .scanner-container {
            text-align: center;
            width: 350px;
            padding: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(0, 20, 30, 0.8);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            border-radius: 15px;
        }

        .scan-window {
            width: 280px;
            height: 380px;
            border: 2px solid #00f2ff;
            position: relative;
            margin: 0 auto 20px;
            overflow: hidden;
            background: #000;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.5);
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        /* Garis Laser */
        .laser-line {
            width: 100%;
            height: 5px;
            background: linear-gradient(to bottom, transparent, #00f2ff, transparent);
            position: absolute;
            top: -10px;
            left: 0;
            box-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff;
            z-index: 10;
            display: none;
        }

        @keyframes scanAnimation {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .scanning .laser-line {
            display: block;
            animation: scanAnimation 2s infinite ease-in-out;
        }

        .status-box h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #0a151b;
            border: 1px solid #00f2ff;
            border-radius: 5px;
            overflow: hidden;
        }

        .fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #008cff, #00f2ff);
            transition: width 0.1s;
        }

        button {
            margin-top: 25px;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 5px;
        }

        button:hover {
            background: #00f2ff;
            color: #050a0f;
            box-shadow: 0 0 20px #00f2ff;
        }

        button:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="scanner-container">
    <div class="scan-window" id="window">
        <!-- Kamera Feed -->
        <video id="video-feed" autoplay playsinline></video>
        <!-- Garis Laser -->
        <div class="laser-line"></div>
    </div>

    <div class="status-box">
        <h2 id="status-text">SYSTEM READY</h2>
        <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    </div>

    <button onclick="startScan()" id="scan-btn">IDENTIFIKASI</button>
</div>

<script>
    /* --- JAVASCRIPT --- */
    
    // Inisialisasi Kamera
    const video = document.getElementById('video-feed');
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Gagal akses kamera: ", err);
            document.getElementById('status-text').innerText = "KAMERA TIDAK AKTIF";
        });
    }

    function startScan() {
        const windowEl = document.getElementById('window');
        const statusText = document.getElementById('status-text');
        const fill = document.getElementById('progress-fill');
        const btn = document.getElementById('scan-btn');

        // Reset & Mulai
        windowEl.classList.add('scanning');
        btn.disabled = true;
        statusText.innerText = "MEMINDAI DATA...";
        statusText.style.color = "#00f2ff";
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += 1;
            fill.style.width = progress + "%";

            if (progress >= 100) {
                clearInterval(interval);
                finishScan();
            }
        }, 50); // Kecepatan scan (total 5 detik)
    }

    function finishScan() {
        const windowEl = document.getElementById('window');
        const statusText = document.getElementById('status-text');
        
        windowEl.classList.remove('scanning');
        statusText.style.color = "#00ff00"; 
        statusText.innerText = "AKSES DITERIMA";
        
        // Logika tambahan bisa ditaruh di sini
        setTimeout(() => {
            alert("Verifikasi Berhasil!");
            // Reset untuk scan ulang jika perlu
            document.getElementById('scan-btn').disabled = false;
        }, 500);
    }
</script>

</body>
</html>
